version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: melodia-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: melodia

  redis:
    image: redis:7-alpine
    container_name: melodia-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: melodia-backend
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/melodia
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
  redis_data:
